<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>

    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628" />
      <stop offset="50%" style="stop-color:#0d2444" />
      <stop offset="100%" style="stop-color:#071020" />
    </linearGradient>

    <radialGradient id="blueGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#00c2ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00c2ff;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#fff8b0" />
      <stop offset="18%"  style="stop-color:#ffd700" />
      <stop offset="35%"  style="stop-color:#c8960c" />
      <stop offset="50%"  style="stop-color:#ffe566" />
      <stop offset="65%"  style="stop-color:#b8820a" />
      <stop offset="82%"  style="stop-color:#ffd700" />
      <stop offset="100%" style="stop-color:#fff0a0" />
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%"   style="stop-color:#fffbe0" />
      <stop offset="20%"  style="stop-color:#ffd700" />
      <stop offset="40%"  style="stop-color:#a86c00" />
      <stop offset="55%"  style="stop-color:#ffe066" />
      <stop offset="75%"  style="stop-color:#c8960c" />
      <stop offset="100%" style="stop-color:#fff4a0" />
    </linearGradient>

    <!-- Blue accent fades in/out horizontally -->
    <linearGradient id="blueAccentStars" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00c2ff;stop-opacity:0" />
      <stop offset="25%"  style="stop-color:#00c2ff;stop-opacity:1" />
      <stop offset="75%"  style="stop-color:#00c2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c2ff;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="blueAccentVF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00c2ff;stop-opacity:0" />
      <stop offset="20%"  style="stop-color:#00c2ff;stop-opacity:1" />
      <stop offset="80%"  style="stop-color:#00c2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c2ff;stop-opacity:0" />
    </linearGradient>

    <filter id="bigShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.75"/>
    </filter>

    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blueGlowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to inner shield so nothing bleeds outside -->
    <clipPath id="shieldClip">
      <path d="M120 22 L206 54 L206 128 C206 176 166 209 120 231 C74 209 34 176 34 128 L34 54 Z" />
    </clipPath>

  </defs>

  <!-- Outer gold border shield -->
  <path d="M120 10 L218 46 L218 128 C218 182 174 218 120 242 C66 218 22 182 22 128 L22 46 Z"
    fill="url(#goldShine)" filter="url(#bigShadow)" />

  <!-- Inner dark shield -->
  <path d="M120 22 L206 54 L206 128 C206 176 166 209 120 231 C74 209 34 176 34 128 L34 54 Z"
    fill="url(#shieldBg)" />

  <!-- Blue radial glow overlay inside shield -->
  <path d="M120 22 L206 54 L206 128 C206 176 166 209 120 231 C74 209 34 176 34 128 L34 54 Z"
    fill="url(#blueGlow)" />

  <!-- Inner gold border line -->
  <path d="M120 30 L198 58 L198 128 C198 171 162 201 120 222 C78 201 42 171 42 128 L42 58 Z"
    fill="none" stroke="url(#goldShine)" stroke-width="1.2" opacity="0.45" />

  <!-- ── 3 rank stars — centred at x=120, top of shield ── -->
  <!-- Left star -->
  <g transform="translate(99, 60) scale(0.9)" filter="url(#goldGlow)">
    <polygon points="0,-9 2.1,-3 8.6,-3 3.5,1.2 5.3,7.7 0,4.2 -5.3,7.7 -3.5,1.2 -8.6,-3 -2.1,-3"
      fill="url(#goldShine)" />
  </g>
  <!-- Centre star — slightly larger -->
  <g transform="translate(120, 57) scale(1.05)" filter="url(#goldGlow)">
    <polygon points="0,-9 2.1,-3 8.6,-3 3.5,1.2 5.3,7.7 0,4.2 -5.3,7.7 -3.5,1.2 -8.6,-3 -2.1,-3"
      fill="url(#goldShine)" />
  </g>
  <!-- Right star -->
  <g transform="translate(141, 60) scale(0.9)" filter="url(#goldGlow)">
    <polygon points="0,-9 2.1,-3 8.6,-3 3.5,1.2 5.3,7.7 0,4.2 -5.3,7.7 -3.5,1.2 -8.6,-3 -2.1,-3"
      fill="url(#goldShine)" />
  </g>

  <!-- Blue accent line under stars — width matches shield at y=76, clipped -->
  <rect x="68" y="76" width="104" height="1.8" rx="0.9"
    fill="url(#blueAccentStars)" filter="url(#blueGlowFilter)"
    clip-path="url(#shieldClip)" />

  <!-- ── VF — vertically centred in remaining shield space (y=78 to y=224) ── -->
  <!-- Remaining space centre = (78+224)/2 = 151, cap height ~63px, baseline = 151+32 = 183 -->
  <text
    x="120"
    y="172"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="94"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="auto"
    fill="url(#goldText)"
    filter="url(#textGlow)"
    letter-spacing="-4"
  >VF</text>

  <!-- Blue accent line under VF — shorter, centred -->
  <rect x="82" y="181" width="76" height="1.8" rx="0.9"
    fill="url(#blueAccentVF)" filter="url(#blueGlowFilter)"
    clip-path="url(#shieldClip)" />

  <!-- Bottom point ornament -->
  <polygon points="120,238 124,228 120,233 116,228"
    fill="url(#goldShine)" opacity="0.85" filter="url(#goldGlow)" />

</svg>
