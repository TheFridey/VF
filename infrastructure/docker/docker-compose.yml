version: '3.9'

# VeteranFinder production docker-compose
# Platform flags removed — Docker BuildKit detects host arch automatically.
# See: infrastructure/docker/README.md for deployment walkthrough.

services:
  postgres:
    image: postgres:15-alpine
    container_name: veteranfinder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-veteranfinder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB:       ${DB_NAME:-veteranfinder}
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c log_min_duration_statement=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-veteranfinder}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    networks: [veteranfinder-network]

  redis:
    image: redis:7-alpine
    container_name: veteranfinder-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
    networks: [veteranfinder-network]

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: veteranfinder-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 3000
      UV_THREADPOOL_SIZE: 16
      DATABASE_URL: postgresql://${DB_USER:-veteranfinder}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-veteranfinder}?connection_limit=10&pool_timeout=20&connect_timeout=10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER must be set}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET must be set}
      FRONTEND_URL: ${FRONTEND_URL:-https://veteranfinder.co.uk}
      ADMIN_URL: ${ADMIN_URL:-https://admin.veteranfinder.co.uk}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_BIA_BASIC_MONTHLY: ${STRIPE_PRICE_BIA_BASIC_MONTHLY}
      STRIPE_PRICE_BIA_BASIC_ANNUAL: ${STRIPE_PRICE_BIA_BASIC_ANNUAL}
      STRIPE_PRICE_BIA_PLUS_MONTHLY: ${STRIPE_PRICE_BIA_PLUS_MONTHLY}
      STRIPE_PRICE_BIA_PLUS_ANNUAL: ${STRIPE_PRICE_BIA_PLUS_ANNUAL}
      STRIPE_PRICE_DIRECTORY_MONTHLY: ${STRIPE_PRICE_DIRECTORY_MONTHLY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-VeteranFinder <noreply@veteranfinder.co.uk>}
      APP_URL: ${APP_URL:-https://veteranfinder.co.uk}
      TURN_HOST: ${TURN_HOST}
      TURN_SECRET: ${TURN_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@veteranfinder.co.uk}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    networks: [veteranfinder-network]

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: veteranfinder-web
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL:-https://veteranfinder.co.uk}
      NEXT_PUBLIC_ENABLE_BIA: "true"
      NEXT_PUBLIC_ENABLE_MEMBERSHIP: "true"
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
    networks: [veteranfinder-network]

  admin:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    container_name: veteranfinder-admin
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3000
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "127.0.0.1:3002:3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks: [veteranfinder-network]

volumes:
  postgres_data:
  redis_data:

networks:
  veteranfinder-network:
    driver: bridge
