version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: veteranfinder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-veteranfinder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veteranfinder_secret}
      POSTGRES_DB: ${DB_NAME:-veteranfinder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-veteranfinder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veteranfinder-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: veteranfinder-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veteranfinder-network

  # NestJS API
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: veteranfinder-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-veteranfinder}:${DB_PASSWORD:-veteranfinder_secret}@postgres:5432/${DB_NAME:-veteranfinder}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:-32-char-encryption-key-here!!!}
      # AWS S3 Configuration
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-veteranfinder-uploads}
      # SMTP Configuration
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@veteranfinder.com}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ../../apps/api:/app
      - /app/node_modules
    networks:
      - veteranfinder-network

  # Next.js Web App
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: veteranfinder-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3001}:3000"
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - veteranfinder-network

  # Mailhog for development email testing
  mailhog:
    image: mailhog/mailhog
    container_name: veteranfinder-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - veteranfinder-network
    profiles:
      - dev

  # pgAdmin for database management (development only)
  pgadmin:
    image: dpage/pgadmin4
    container_name: veteranfinder-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@veteranfinder.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - veteranfinder-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  veteranfinder-network:
    driver: bridge
