apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: veteranfinder-dev

namePrefix: dev-

resources:
  - ../../base

patches:
  # Reduce replicas for dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: web
  # Reduce resource requests for dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
    target:
      kind: Deployment
  # Update HPA for dev
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler

configMapGenerator:
  - name: api-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - CORS_ORIGIN=https://dev.veteranfinder.com
  - name: web-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://api.dev.veteranfinder.com
      - NEXT_PUBLIC_SITE_URL=https://dev.veteranfinder.com

images:
  - name: veteranfinder-api
    newTag: dev
  - name: veteranfinder-web
    newTag: dev
