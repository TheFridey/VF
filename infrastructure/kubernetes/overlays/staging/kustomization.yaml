apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: veteranfinder-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  # Staging replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
  # Staging resources
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
    target:
      kind: Deployment
  # Staging HPA
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
    target:
      kind: HorizontalPodAutoscaler

configMapGenerator:
  - name: api-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=debug
      - CORS_ORIGIN=https://staging.veteranfinder.co.uk
  - name: web-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - NEXT_PUBLIC_API_URL=https://api.staging.veteranfinder.co.uk
      - NEXT_PUBLIC_SITE_URL=https://staging.veteranfinder.co.uk

images:
  - name: veteranfinder-api
    newTag: staging
  - name: veteranfinder-web
    newTag: staging
