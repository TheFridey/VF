services:
  postgres:
    image: postgres:15-alpine
    container_name: vf-postgres
    environment:
      POSTGRES_USER: veteranfinder
      POSTGRES_PASSWORD: veteranfinder
      POSTGRES_DB: veteranfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veteranfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vf-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:v1.12
    container_name: vf-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  coturn:
    image: coturn/coturn:latest
    container_name: vf-coturn
    network_mode: host
    restart: unless-stopped
    profiles:
      - video
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf

volumes:
  postgres_data:
  redis_data:
