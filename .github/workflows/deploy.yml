name: VeteranFinder Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
            image: veteranfinder-api
          - app: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
            image: veteranfinder-web
            build-args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
              NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
              NEXT_PUBLIC_ADMIN_APP_URL=${{ vars.NEXT_PUBLIC_ADMIN_APP_URL }}
              NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          - app: admin
            context: ./apps/admin
            dockerfile: ./apps/admin/Dockerfile
            image: veteranfinder-admin
            build-args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.DEPLOY_ENVIRONMENT }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export VETERANFINDER_IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
            export VETERANFINDER_IMAGE_TAG=${{ env.IMAGE_TAG }}

            docker compose -f infrastructure/docker/docker-compose.yml --env-file .env pull api web admin
            docker compose -f infrastructure/docker/docker-compose.yml --env-file .env up -d api web admin
            docker compose -f infrastructure/docker/docker-compose.yml --env-file .env exec -T api npx prisma migrate deploy

            if [ -n "${{ vars.HEALTHCHECK_URL }}" ]; then
              curl --fail --silent --show-error "${{ vars.HEALTHCHECK_URL }}"
            fi
