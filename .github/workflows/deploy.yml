name: VeteranFinder Deploy

on:
  workflow_run:
    workflows: ['VeteranFinder CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  verify-release:
    name: Verify Release Gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      deploy_environment: ${{ steps.resolve.outputs.deploy_environment }}
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}

    steps:
      - id: resolve
        uses: actions/github-script@v7
        env:
          TARGET_ENV: ${{ github.event.inputs.environment || 'staging' }}
        with:
          script: |
            if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;

              if (run.conclusion !== 'success') {
                core.setFailed(`VeteranFinder CI concluded with '${run.conclusion}'.`);
                return;
              }

              if (run.head_branch !== 'main') {
                core.setFailed(`Refusing automatic deploy from branch '${run.head_branch}'.`);
                return;
              }

              core.setOutput('deploy_sha', run.head_sha);
              core.setOutput('deploy_environment', 'staging');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch,
              event: 'push',
              status: 'completed',
              per_page: 100,
            });

            const matchingRun = runs.find((run) => run.head_sha === sha && run.conclusion === 'success');

            if (!matchingRun) {
              core.setFailed(
                `No successful VeteranFinder CI run was found for ${sha}. Run CI on this commit before deploying.`,
              );
              return;
            }

            core.setOutput('deploy_sha', sha);
            core.setOutput('deploy_environment', process.env.TARGET_ENV || 'staging');

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: verify-release
    environment: ${{ needs.verify-release.outputs.deploy_environment }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
            image: veteranfinder-api
          - app: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
            image: veteranfinder-web
            build-args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
              NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
              NEXT_PUBLIC_ADMIN_APP_URL=${{ vars.NEXT_PUBLIC_ADMIN_APP_URL }}
              NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          - app: admin
            context: ./apps/admin
            dockerfile: ./apps/admin/Dockerfile
            image: veteranfinder-admin
            build-args: |
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-release.outputs.deploy_sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ needs.verify-release.outputs.deploy_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ needs.verify-release.outputs.deploy_environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ needs.verify-release.outputs.deploy_environment }}
    runs-on: ubuntu-latest
    needs: [verify-release, build-and-push]
    environment: ${{ needs.verify-release.outputs.deploy_environment }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            export VETERANFINDER_IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
            export VETERANFINDER_IMAGE_TAG=${{ needs.verify-release.outputs.deploy_sha }}

            docker compose -f infrastructure/docker/docker-compose.yml --env-file .env pull api web admin
            docker compose -f infrastructure/docker/docker-compose.yml --env-file .env run --rm api npx prisma migrate deploy
            docker compose -f infrastructure/docker/docker-compose.yml --env-file .env up -d api web admin

            if [ -n "${{ vars.HEALTHCHECK_URL }}" ]; then
              curl --fail --silent --show-error "${{ vars.HEALTHCHECK_URL }}"
            fi
