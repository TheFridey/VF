name: VeteranFinder Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build \
            -t veteranfinder-api:${{ github.sha }} \
            -f apps/api/Dockerfile \
            .

      - name: Build web Docker image
        run: |
          docker build \
            -t veteranfinder-web:${{ github.sha }} \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }} \
            .

      - name: Build admin Docker image
        run: |
          docker build \
            -t veteranfinder-admin:${{ github.sha }} \
            -f apps/admin/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            .

      - name: Deployment complete
        run: echo "Built images for ${{ github.sha }} targeting ${{ github.event.inputs.environment || 'staging' }}"
