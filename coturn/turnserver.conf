# VeteranFinder — coturn TURN server configuration

# Listening port
listening-port=3478
tls-listening-port=5349

# Your server's public IP (replace with actual VPS IP at deploy time)
# external-ip=YOUR_VPS_IP

# Relay port range (open these in your firewall)
min-port=49152
max-port=65535

# Authentication
use-auth-secret
static-auth-secret=${TURN_SECRET}

# Realm
realm=veteranfinder.co.uk

# TLS certificates (Let's Encrypt paths — update to match your cert location)
# cert=/etc/letsencrypt/live/turn.veteranfinder.co.uk/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.veteranfinder.co.uk/privkey.pem

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
fingerprint
lt-cred-mech
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
